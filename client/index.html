<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Crusader Combat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="title-music" loop preload="auto">
      <source src="audio/choir.mp3" type="audio/mpeg" />
      <source src="audio/choir.ogg" type="audio/ogg" />
    </audio>
    <div id="title-screen" class="title-screen">
      <svg aria-hidden="true" class="title-screen-filters">
        <defs>
          <filter id="cast-iron-grain" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="noise" />
            <feColorMatrix type="saturate" values="0" in="noise" result="mono" />
            <feComponentTransfer in="mono" result="soft">
              <feFuncR type="linear" slope="0.25" intercept="0.6" />
              <feFuncG type="linear" slope="0.25" intercept="0.6" />
              <feFuncB type="linear" slope="0.25" intercept="0.6" />
            </feComponentTransfer>
            <feComposite in="soft" in2="SourceAlpha" operator="in" result="noise-on-text" />
            <feBlend in="SourceGraphic" in2="noise-on-text" mode="multiply" result="textured" />
            <feComposite in="textured" in2="SourceAlpha" operator="in" result="sharp" />
          </filter>
          <filter id="title-fire-glow" x="-30%" y="-20%" width="160%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
            <feOffset in="blur" dx="0" dy="2" result="offset" />
            <feFlood flood-color="#c04020" flood-opacity="0.5" result="flame" />
            <feComposite in="flame" in2="offset" operator="in" result="glow" />
            <feMerge>
              <feMergeNode in="glow" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      </svg>
      <canvas id="title-flames"></canvas>
      <div class="title-screen-content">
        <div class="title-metal-wrap">
          <svg class="title-logo" viewBox="0 0 420 100" aria-label="Crusader Combat" role="img">
            <defs>
              <!-- Gray base with solid white at very top (so top reflection stays bright) -->
              <linearGradient id="titleMetalFill" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" />
                <stop offset="4%" stop-color="#fcfaf8" />
                <stop offset="8%" stop-color="#5c5852" />
                <stop offset="50%" stop-color="#504c46" />
                <stop offset="80%" stop-color="#48443e" />
                <stop offset="100%" stop-color="#4c4840" />
              </linearGradient>
              <linearGradient id="titleOrangeGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#b87818" stop-opacity="0" />
                <stop offset="58%" stop-color="#b87818" stop-opacity="0" />
                <stop offset="70%" stop-color="#c89020" stop-opacity="1" />
                <stop offset="85%" stop-color="#e0a828" stop-opacity="1" />
                <stop offset="100%" stop-color="#f0c030" stop-opacity="1" />
              </linearGradient>
              <!-- White reflections: top of word + softer bands where horizontal strokes catch light -->
              <linearGradient id="titleWhiteGlow" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                <stop offset="8%" stop-color="#fcfaf8" stop-opacity="1" />
                <stop offset="14%" stop-color="#f0eee8" stop-opacity="0" />
                <stop offset="18%" stop-color="#fffefc" stop-opacity="0.14" />
                <stop offset="23%" stop-color="#fffefc" stop-opacity="0.38" />
                <stop offset="28%" stop-color="#f8f6f2" stop-opacity="0.14" />
                <stop offset="34%" stop-color="#f0eee8" stop-opacity="0" />
                <stop offset="36%" stop-color="#fffefc" stop-opacity="0" />
                <stop offset="40%" stop-color="#fffefc" stop-opacity="0.1" />
                <stop offset="44%" stop-color="#fffefc" stop-opacity="0.3" />
                <stop offset="50%" stop-color="#f8f6f2" stop-opacity="0.1" />
                <stop offset="56%" stop-color="#f0eee8" stop-opacity="0" />
                <stop offset="100%" stop-color="#f0eee8" stop-opacity="0" />
              </linearGradient>
              <!-- Mask: visible only at top 18% of each element (solid white cap) -->
              <linearGradient id="topWhiteMaskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="white" />
                <stop offset="18%" stop-color="white" />
                <stop offset="26%" stop-color="black" />
                <stop offset="100%" stop-color="black" />
              </linearGradient>
              <mask id="topWhiteMask" maskContentUnits="objectBoundingBox">
                <rect x="0" y="0" width="1" height="1" fill="url(#topWhiteMaskGrad)" />
              </mask>
            </defs>
            <!-- Metal base: two-line wordmark with subtle stroke for carved look -->
            <text x="210" y="38" text-anchor="middle" class="title-logo-line" fill="url(#titleMetalFill)" filter="url(#cast-iron-grain)" stroke="rgba(0,0,0,0.35)" stroke-width="0.6">CRUSADER</text>
            <text x="210" y="72" text-anchor="middle" class="title-logo-line" fill="url(#titleMetalFill)" filter="url(#cast-iron-grain)" stroke="rgba(0,0,0,0.35)" stroke-width="0.6">COMBAT</text>
            <!-- Flickering fire reflection on bottom of letters -->
            <text x="210" y="38" text-anchor="middle" class="title-logo-line title-orange-layer" fill="url(#titleOrangeGlow)">CRUSADER</text>
            <text x="210" y="72" text-anchor="middle" class="title-logo-line title-orange-layer" fill="url(#titleOrangeGlow)">COMBAT</text>
            <!-- White reflection at very top of letters -->
            <text x="210" y="38" text-anchor="middle" class="title-logo-line title-white-layer" fill="url(#titleWhiteGlow)">CRUSADER</text>
            <text x="210" y="72" text-anchor="middle" class="title-logo-line title-white-layer" fill="url(#titleWhiteGlow)">COMBAT</text>
            <!-- Solid white at top only: white fill + mask so only top 16% shows -->
            <text x="210" y="38" text-anchor="middle" class="title-logo-line title-top-white" fill="#ffffff" mask="url(#topWhiteMask)">CRUSADER</text>
            <text x="210" y="72" text-anchor="middle" class="title-logo-line title-top-white" fill="#ffffff" mask="url(#topWhiteMask)">COMBAT</text>
          </svg>
        </div>
        <p class="title-subtitle">Press any key or click to begin</p>
      </div>
      <nav id="title-main-menu" class="title-main-menu" aria-label="Main menu">
        <ul class="title-menu-list">
          <li><button type="button" class="title-menu-btn" data-menu="campaign">Campaign</button></li>
          <li><button type="button" class="title-menu-btn" data-menu="endless">Endless Mode</button></li>
          <li><button type="button" class="title-menu-btn" data-menu="options">Options</button></li>
          <li><button type="button" class="title-menu-btn" data-menu="exit">Exit</button></li>
        </ul>
      </nav>
      <div id="title-options-panel" class="title-options-panel hidden" aria-label="Options">
        <h2 class="title-options-heading">Options</h2>
        <p class="title-options-placeholder">More options coming soon.</p>
        <button type="button" id="title-options-back" class="title-menu-btn">Back</button>
      </div>
      <button type="button" id="title-music-toggle" class="title-music-toggle" aria-label="Mute music" title="Mute music">
        <span class="title-music-toggle-icon" aria-hidden="true">🔊</span>
      </button>
    </div>

    <div class="ui">
      <div class="title">
        <span class="accent">Crusader</span> Combat
      </div>
      <div class="hud">
        <div class="hud-section">
          <div class="label">Knight</div>
          <div class="bar-shell">
            <div id="player-health" class="bar-fill"></div>
          </div>
        </div>
        <div class="hud-section">
          <div class="label">Demons</div>
          <div class="bar-shell demons">
            <div id="demon-tide" class="bar-fill demons"></div>
          </div>
        </div>
        <div class="hud-section compact">
          <div class="label">Score</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="hud-section compact">
          <div class="label">Time</div>
          <div id="time" class="value">0s</div>
        </div>
      </div>
      <div class="help">
        <span>Move: A / D &nbsp; Jump: W or Space &nbsp; Attack: J &nbsp; Block: K</span>
      </div>
    </div>

    <canvas id="game" width="960" height="540" tabindex="0"></canvas>

    <div id="overlay" class="overlay hidden">
      <div class="panel">
        <h2 id="overlay-title">Victory</h2>
        <p id="overlay-message"></p>
        <div class="score-entry">
          <label>
            Name:
            <input id="player-name-input" maxlength="16" placeholder="Anonymous" />
          </label>
          <button id="save-score">Save score</button>
        </div>
        <div class="leaderboard">
          <h3>Top Crusaders</h3>
          <ul id="leaderboard-list"></ul>
        </div>
        <button id="play-again" class="primary">Fight again</button>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
  </html>
