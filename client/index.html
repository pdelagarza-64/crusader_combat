<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Crusader Combat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="title-screen" class="title-screen">
      <svg aria-hidden="true" class="title-screen-filters">
        <defs>
          <filter id="cast-iron-grain" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="noise" />
            <feColorMatrix type="saturate" values="0" in="noise" result="mono" />
            <feComponentTransfer in="mono" result="soft">
              <feFuncR type="linear" slope="0.4" intercept="0.5" />
              <feFuncG type="linear" slope="0.4" intercept="0.5" />
              <feFuncB type="linear" slope="0.4" intercept="0.5" />
            </feComponentTransfer>
            <feComposite in="soft" in2="SourceAlpha" operator="in" result="noise-on-text" />
            <feBlend in="SourceGraphic" in2="noise-on-text" mode="overlay" result="textured" />
            <!-- Restore crisp letter edges: clip to original text shape -->
            <feComposite in="textured" in2="SourceAlpha" operator="in" result="sharp" />
          </filter>
          <filter id="title-fire-glow" x="-30%" y="-20%" width="160%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur" />
            <feOffset in="blur" dx="0" dy="2" result="offset" />
            <feFlood flood-color="#c04020" flood-opacity="0.5" result="flame" />
            <feComposite in="flame" in2="offset" operator="in" result="glow" />
            <feMerge>
              <feMergeNode in="glow" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      </svg>
      <canvas id="title-flames"></canvas>
      <div class="title-screen-content">
        <div class="title-metal-wrap">
          <h1 class="title-metal">Crusader Combat</h1>
        </div>
        <p class="title-subtitle">Press any key or click to begin</p>
      </div>
    </div>

    <div class="ui">
      <div class="title">
        <span class="accent">Crusader</span> Combat
      </div>
      <div class="hud">
        <div class="hud-section">
          <div class="label">Knight</div>
          <div class="bar-shell">
            <div id="player-health" class="bar-fill"></div>
          </div>
        </div>
        <div class="hud-section">
          <div class="label">Demons</div>
          <div class="bar-shell demons">
            <div id="demon-tide" class="bar-fill demons"></div>
          </div>
        </div>
        <div class="hud-section compact">
          <div class="label">Score</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="hud-section compact">
          <div class="label">Time</div>
          <div id="time" class="value">0s</div>
        </div>
      </div>
      <div class="help">
        <span>Move: A / D &nbsp; Jump: W or Space &nbsp; Attack: J &nbsp; Block: K</span>
      </div>
    </div>

    <canvas id="game" width="960" height="540" tabindex="0"></canvas>

    <div id="overlay" class="overlay hidden">
      <div class="panel">
        <h2 id="overlay-title">Victory</h2>
        <p id="overlay-message"></p>
        <div class="score-entry">
          <label>
            Name:
            <input id="player-name-input" maxlength="16" placeholder="Anonymous" />
          </label>
          <button id="save-score">Save score</button>
        </div>
        <div class="leaderboard">
          <h3>Top Crusaders</h3>
          <ul id="leaderboard-list"></ul>
        </div>
        <button id="play-again" class="primary">Fight again</button>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
  </html>
